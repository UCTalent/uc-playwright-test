steps:
  # ---------------------------------------------------------------------------
  # Step 1: Validate required files exist in source before deploying
  # ---------------------------------------------------------------------------
  - name: 'bash'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "=== Pre-flight: Validating source ==="
        [ -f "package.json" ]         || { echo "ERROR: package.json is missing!"; exit 1; }
        echo "✓ package.json"
        [ -f "package-lock.json" ]    || { echo "ERROR: package-lock.json is missing!"; exit 1; }
        echo "✓ package-lock.json"
        [ -f "playwright.config.ts" ] || { echo "ERROR: playwright.config.ts is missing!"; exit 1; }
        echo "✓ playwright.config.ts"
        [ -f "scripts/run-nightly-tests.sh" ] || { echo "ERROR: scripts/run-nightly-tests.sh is missing!"; exit 1; }
        echo "✓ run-nightly-tests.sh"
        echo "=== Source OK ==="

  # ---------------------------------------------------------------------------
  # Step 2: SSH into VPS and setup E2E cron
  # Cloud Build already has the source — no git clone needed on VPS
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -e
        apk add --no-cache openssh-client rsync

        # --- Setup SSH ---
        mkdir -p /root/.ssh
        chmod 700 /root/.ssh
        printenv VM_SSH_KEY | sed 's/\\n/\n/g' | tr -d '\r' > /root/.ssh/id_rsa
        chmod 600 /root/.ssh/id_rsa
        if ! ssh-keygen -y -f /root/.ssh/id_rsa > /dev/null; then
          echo "ERROR: Invalid SSH key in Secret Manager."
          exit 1
        fi

        # --- Define and Validate Deploy Paths ---
        DEPLOY_DIR="$_E2E_DEPLOY_DIR"
        LOG_DIR="$_E2E_LOG_DIR"
        REPORT_DIR="$_E2E_REPORT_DIR"

        # Prevent empty or dangerous system directory targets
        case "$DEPLOY_DIR" in
          ""|/|/opt|/home|/root|/var|/usr|/bin|/sbin)
            echo "ERROR: Invalid or dangerous DEPLOY_DIR: '$DEPLOY_DIR'"
            exit 1
            ;;
        esac

        # --- Escape Variables for Safe Insertion ---
        # Replaces all single quotes (') with ('\'') to guarantee safe variable assignments
        DEPLOY_DIR_ESC=$(printf '%s' "$DEPLOY_DIR" | sed "s/'/'\\\\''/g")
        LOG_DIR_ESC=$(printf '%s' "$LOG_DIR" | sed "s/'/'\\\\''/g")
        REPORT_DIR_ESC=$(printf '%s' "$REPORT_DIR" | sed "s/'/'\\\\''/g")
        FE_URL_ESC=$(printf '%s' "$_E2E_FRONTEND_URL" | sed "s/'/'\\\\''/g")
        ATS_URL_ESC=$(printf '%s' "$_E2E_ATS_URL" | sed "s/'/'\\\\''/g")
        API_URL_ESC=$(printf '%s' "$_E2E_API_URL" | sed "s/'/'\\\\''/g")
        CRON_MINUTE_ESC=$(printf '%s' "$_E2E_CRON_MINUTE" | sed "s/'/'\\\\''/g")
        CRON_HOUR_ESC=$(printf '%s' "$_E2E_CRON_HOUR" | sed "s/'/'\\\\''/g")
        VM_USERNAME_ESC=$(printf '%s' "$_VM_USERNAME" | sed "s/'/'\\\\''/g")

        echo "=== Creating directories on VPS ==="
        ssh -i /root/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o Port="$$SSH_PORT" "$_VM_USERNAME@$_VM_HOST" "DEPLOY_DIR='$DEPLOY_DIR_ESC' LOG_DIR='$LOG_DIR_ESC' REPORT_DIR='$REPORT_DIR_ESC' VM_USERNAME='$VM_USERNAME_ESC' bash -s" << '        EOF'
        set -e
        sudo mkdir -p "$DEPLOY_DIR" "$LOG_DIR" "$REPORT_DIR"
        sudo chown -R "$VM_USERNAME:$VM_USERNAME" "$DEPLOY_DIR" "$LOG_DIR" "$REPORT_DIR"
        EOF

        echo "=== Generating local .env template ==="
        cat << '        EOF' | sed 's/^        //' > .env.template
        # Playwright E2E — generated by Cloud Build (do not commit)
        CI=true
        CI_AUTH_MODE=reuse
        FRONTEND_URL=$_E2E_FRONTEND_URL
        BASE_URL=$_E2E_FRONTEND_URL
        ATS_URL=$_E2E_ATS_URL
        API_BASE_URL=$_E2E_API_URL
        E2E_LOG_DIR=$_E2E_LOG_DIR
        E2E_REPORT_DIR=$_E2E_REPORT_DIR
        EOF


        echo "=== Syncing source code to VPS ==="
        # -s/--protect-args prevents remote shell expansion of the path
        # Excludes .agents/ to prevent syncing build plan and audit files
        rsync -az --delete -s \
          --exclude='.git/' \
          --exclude='.agents/' \
          --exclude='node_modules/' \
          --exclude='playwright-report/' \
          --exclude='nightly-logs/' \
          --exclude='nightly-reports/' \
          --exclude='storageState.json' \
          --exclude='.env' \
          -e "ssh -i /root/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o Port=\"$$SSH_PORT\"" \
          ./ "$_VM_USERNAME@$_VM_HOST:$DEPLOY_DIR/"

        rm -f .env.template

        echo "=== Installing dependencies on VPS ==="
        ssh -i /root/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o Port="$$SSH_PORT" "$_VM_USERNAME@$_VM_HOST" "DEPLOY_DIR='$DEPLOY_DIR_ESC' bash -s" << '        EOF'
        set -e
        cd "$DEPLOY_DIR"

        # Ensure Node.js >= 18 is present and compatible
        NODE_OK=0
        if command -v node > /dev/null 2>&1; then
          NODE_VERSION=$(node -v | cut -d'v' -f2)
          NODE_MAJOR=$(echo "$NODE_VERSION" | cut -d'.' -f1)
          if [ "$NODE_MAJOR" -ge 18 ]; then
            NODE_OK=1
          fi
        fi

        if [ "$NODE_OK" -eq 0 ]; then
          echo 'Node.js not found or version is < 18. Installing Node 20 LTS...'
          sudo apt-get update && sudo apt-get install -y ca-certificates curl gnupg
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | sudo gpg --dearmor --yes -o /etc/apt/keyrings/nodesource.gpg
          echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" | sudo tee /etc/apt/sources.list.d/nodesource.list
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
        fi
        echo "Node: $(node -v)"

        # Install npm dependencies
        npm ci --prefer-offline
        echo '✓ npm ci done'

        # Install Playwright Chromium browser (let Playwright verify cache natively)
        npx playwright install chromium --with-deps
        echo '✓ Playwright Chromium install/verify complete'

        # Ensure runner script is executable
        chmod +x "$DEPLOY_DIR/scripts/run-nightly-tests.sh"
        EOF

        echo "=== Writing .env on VPS ==="
        ssh -i /root/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o Port="$$SSH_PORT" "$_VM_USERNAME@$_VM_HOST" "DEPLOY_DIR='$DEPLOY_DIR_ESC' bash -s" << '        EOF'
        set -e
        touch "$DEPLOY_DIR/.env"
        if [ -f "$DEPLOY_DIR/.env.template" ]; then
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
            key=$(echo "$line" | cut -d= -f1)
            val=$(echo "$line" | cut -d= -f2-)
            if ! grep -q "^${key}=" "$DEPLOY_DIR/.env"; then
              echo "${key}=${val}" >> "$DEPLOY_DIR/.env"
              echo "  Added missing env: ${key}"
            fi
          done < "$DEPLOY_DIR/.env.template"
          rm -f "$DEPLOY_DIR/.env.template"
          echo '✓ .env merged and cleaned'
        fi
        EOF

        echo "=== Installing cron job on VPS ==="
        ssh -i /root/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o Port="$$SSH_PORT" "$_VM_USERNAME@$_VM_HOST" "DEPLOY_DIR='$DEPLOY_DIR_ESC' LOG_DIR='$LOG_DIR_ESC' REPORT_DIR='$REPORT_DIR_ESC' CRON_MINUTE='$CRON_MINUTE_ESC' CRON_HOUR='$CRON_HOUR_ESC' bash -s" << '        EOF'
        set -e
        CRON_ID="CRON_ID=uc-playwright-e2e-nightly"
        CRON_CMD="$CRON_MINUTE $CRON_HOUR * * * $CRON_ID E2E_DIR=$DEPLOY_DIR E2E_LOG_DIR=$LOG_DIR E2E_REPORT_DIR=$REPORT_DIR /usr/bin/env bash $DEPLOY_DIR/scripts/run-nightly-tests.sh >> $LOG_DIR/cron-wrapper.log 2>&1"
        
        (crontab -l 2>/dev/null | grep -v "$CRON_ID" || true; echo "$CRON_CMD") | crontab -
        echo '✓ Cron registered:'
        crontab -l | grep "$CRON_ID"
        EOF

        echo ""
        echo "========================================================"
        echo "✅ E2E deploy complete!"
        echo ""
        echo "⚠️  ACTION REQUIRED: Upload storageState.json to VPS"
        echo "   scp storageState.json $_VM_USERNAME@$_VM_HOST:$DEPLOY_DIR/storageState.json"
        echo ""
        echo "Smoke test:"
        echo "   ssh $_VM_USERNAME@$_VM_HOST 'E2E_DIR=$DEPLOY_DIR bash $DEPLOY_DIR/scripts/run-nightly-tests.sh'"
        echo "========================================================"
    secretEnv: ['VM_SSH_KEY', 'SSH_PORT']

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/dev-vm-ssh-key/versions/latest
    env: 'VM_SSH_KEY'
  - versionName: projects/$PROJECT_ID/secrets/ssh-port-dev/versions/latest
    env: 'SSH_PORT'

substitutions:
  _VM_HOST: '14.225.210.119'
  _VM_USERNAME: 'alphaforce'

  # --- E2E deploy paths on VPS ---
  _E2E_DEPLOY_DIR: '/opt/uctalents/playwright-tests'
  _E2E_LOG_DIR: '/opt/uctalents/playwright-logs'
  _E2E_REPORT_DIR: '/opt/uctalents/playwright-reports'

  # --- Cron schedule (UTC) — default 19:00 UTC = 02:00 ICT ---
  _E2E_CRON_HOUR: '19'
  _E2E_CRON_MINUTE: '0'

  # --- Target URLs ---
  _E2E_FRONTEND_URL: 'https://uctalent.dev'
  _E2E_ATS_URL: 'https://business.uctalent.dev'
  _E2E_API_URL: 'https://api.nest.uctalent.dev'

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
